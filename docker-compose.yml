version: '3.8'

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

networks:
  internal:
    driver: bridge
    internal: true

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: auntsex
      POSTGRES_USER: auntsex
      POSTGRES_PASSWORD: ${DB_PASSWORD:-dev_change_me}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auntsex"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal
    logging: *default-logging

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD:-dev_change_me_redis}
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-dev_change_me_redis}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal
    logging: *default-logging

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    environment:
      DATABASE_URL: "postgresql://auntsex:${DB_PASSWORD:-dev_change_me}@postgres:5432/auntsex"
      REDIS_URL: "redis://:${REDIS_PASSWORD:-dev_change_me_redis}@redis:6379"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-dev_change_me_redis}
      NEXTAUTH_URL: ${SITE_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:?NEXTAUTH_SECRET is required}
      MAXELPAY_API_KEY: ${MAXELPAY_API_KEY:-}
      MAXELPAY_WEBHOOK_SECRET: ${MAXELPAY_WEBHOOK_SECRET:-}
      SITE_URL: ${SITE_URL:-http://localhost:3000}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "127.0.0.1:3000:3000"
    networks:
      - internal
    logging: *default-logging

  worker:
    build:
      context: ./apps/worker
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    environment:
      DATABASE_URL: "postgresql://auntsex:${DB_PASSWORD:-dev_change_me}@postgres:5432/auntsex"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-dev_change_me_redis}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_REGION: ${AWS_REGION:-us-east-1}
    networks:
      - internal
    logging: *default-logging

volumes:
  pgdata:
  redisdata:
