route:
  receiver: default
  group_by: [alertname, severity]
  group_wait: 10s
  group_interval: 2m
  repeat_interval: 1h
  routes:
    - receiver: page-on-call
      match:
        severity: critical
      repeat_interval: 5m
    - receiver: slack-alerts
      match:
        severity: high
      repeat_interval: 30m
    - receiver: dashboard-only
      match:
        channel: dashboard-only
      repeat_interval: 6h

receivers:
  - name: default
    slack_configs:
      - api_url: "https://hooks.slack.com/services/CHANGE_ME"
        channel: "#alerts"
        title: '{{ template "custom.title" . }}'
        text: '{{ template "custom.slack" . }}'

  - name: page-on-call
    pagerduty_configs:
      - routing_key: "CHANGE_ME"
        severity: critical
        description: '{{ .GroupLabels.alertname }}: {{ .GroupLabels.severity }}'
    slack_configs:
      - api_url: "https://hooks.slack.com/services/CHANGE_ME"
        channel: "#on-call"
        title: '🚨 {{ .GroupLabels.alertname }}'
        text: '{{ template "custom.slack" . }}'

  - name: slack-alerts
    slack_configs:
      - api_url: "https://hooks.slack.com/services/CHANGE_ME"
        channel: "#fraud-alerts"
        title: '⚠️ {{ .GroupLabels.alertname }}'
        text: '{{ template "custom.slack" . }}'

  - name: dashboard-only
    slack_configs: []

templates:
  - /etc/alertmanager/templates/*.tmpl
