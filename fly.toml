# fly.toml app configuration file generated for aunt-sex on 2026-05-23T15:39:59Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'aunt-sex'
primary_region = 'ams'

[build]

[deploy]
  release_command = 'npx prisma migrate deploy'

[env]
  NODE_ENV = "production"
  LOG_LEVEL = "info"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  cpu_kind = 'shared'
  cpus = 2
  memory_mb = 2048

[[services]]
  processes = ['worker']
  internal_port = 3000
  min_machines_running = 0
  auto_stop_machines = 'off'
  auto_start_machines = true

  [[services.ports]]
    port = 3000
    handlers = []
